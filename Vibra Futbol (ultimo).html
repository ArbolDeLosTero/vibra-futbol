<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vibra Fútbol — 足球震动</title>
  <meta name="theme-color" content="#0a0a14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #FEF9F2;
      --surface: #FFFFFF;
      --surface-alt: #FFF7ED;
      --red-bright: #F44336;
      --red-soft: #FFEBEE;
      --gold: #F9A825;
      --gold-bright: #FFD600;
      --gold-soft: #FFF8E1;
      --green-bright: #66BB6A;
      --green-soft: #E8F5E9;
      --blue-bright: #42A5F5;
      --blue-soft: #E3F2FD;
      --orange: #FF6D00;
      --navy: #1A237E;
      --text: #1A1A2E;
      --text-muted: #8A8A9A;
      --border: rgba(0,0,0,0.06);
      --font-display: 'Bangers', cursive;
      --font-heading: 'Fredoka', sans-serif;
      --font-body: 'Nunito', sans-serif;
      --font-zh: 'Noto Sans SC', sans-serif;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--font-body); color:var(--text); min-height:100vh; overflow-x:hidden; background:#0a0a14; }

    .top-stripe { position:fixed; top:0; left:0; right:0; height:4px; z-index:999; background:linear-gradient(90deg,#E53935,#FF9800,#FFD600,#4CAF50,#2196F3,#9C27B0,#E53935); background-size:200% 100%; animation:stripeFlow 4s linear infinite; }
    @keyframes stripeFlow { from{background-position:0% 0%} to{background-position:200% 0%} }

    .pulse-bg { position:fixed; top:38%; left:50%; width:260px; height:260px; border-radius:50%; background:radial-gradient(circle,rgba(249,168,37,0.22) 0%,transparent 70%); transform:translate(-50%,-50%); animation:pulseHeart 3s ease-in-out infinite; pointer-events:none; z-index:0; transition:background 0.5s,animation-duration 0.5s; }
    .pulse-bg.fast { animation-duration:1.2s; }
    .pulse-bg.goal { background:radial-gradient(circle,rgba(255,214,0,0.45) 0%,transparent 70%); animation:pulseGoalBurst 0.25s ease-out 4; }
    .pulse-bg.flatline { background:radial-gradient(circle,rgba(100,0,0,0.3) 0%,transparent 70%); animation:none; }
    @keyframes pulseHeart { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.4} 50%{transform:translate(-50%,-50%) scale(1.12);opacity:0.7} }
    @keyframes pulseGoalBurst { 0%{transform:translate(-50%,-50%) scale(1);opacity:0.9} 100%{transform:translate(-50%,-50%) scale(2.8);opacity:0} }

    .vibra-indicator { position:fixed; top:18px; right:18px; z-index:10; width:30px; height:30px; border-radius:50%; background:var(--red-bright); display:flex; align-items:center; justify-content:center; font-size:0.75rem; color:#fff; opacity:0; transition:opacity 0.15s; }
    .vibra-indicator.active { opacity:1; animation:vibraShake 0.3s ease; }
    @keyframes vibraShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px) rotate(-3deg)} 75%{transform:translateX(4px) rotate(3deg)} }

    .bg-mode-badge { position:fixed; top:18px; left:18px; z-index:10; display:flex; align-items:center; gap:6px; font-family:var(--font-heading); font-size:0.6rem; font-weight:600; color:var(--green-bright); background:var(--green-soft); padding:4px 10px; border-radius:12px; opacity:0; transition:opacity 0.3s; }
    .bg-mode-badge.active { opacity:1; }

    /* SPLASH */
    #splash { position:fixed; inset:0; z-index:100; overflow:hidden; transition:opacity 0.8s ease,transform 0.8s ease; }
    #splash.hide { opacity:0; transform:scale(1.06); pointer-events:none; }
    .splash-bg { position:absolute; inset:0; background:url('https://raw.githubusercontent.com/ArbolDeLosTero/vibra-futbol/main/Imagen-Fongo/Fondo%20del%20estadio.png') center center / cover no-repeat; z-index:0; }
    .splash-overlay { position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,0.45) 0%,rgba(0,0,0,0.1) 30%,rgba(0,0,0,0.05) 50%,rgba(0,0,0,0.15) 75%,rgba(0,0,0,0.5) 100%); z-index:1; }
    .trophy-layer { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10; animation:trophyFloat 3s ease-in-out infinite; pointer-events:none; }
    .trophy-layer img { width:140px; height:auto; filter:drop-shadow(0 0 30px rgba(255,215,0,0.5)) drop-shadow(0 4px 20px rgba(0,0,0,0.4)); mix-blend-mode:multiply; }
    @keyframes trophyFloat { 0%,100%{transform:translate(-50%,-50%) translateY(0)} 50%{transform:translate(-50%,-50%) translateY(-12px)} }
    .trophy-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:250px; height:250px; border-radius:50%; background:radial-gradient(circle,rgba(255,215,0,0.3),transparent 70%); animation:glowPulse 2.5s ease-in-out infinite; z-index:9; pointer-events:none; }
    @keyframes glowPulse { 0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)} }
    .messi-layer { position:absolute; bottom:8%; left:3%; z-index:12; animation:playerFloat 2.5s ease-in-out infinite; }
    .messi-layer img { width:160px; height:auto; filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5)); mix-blend-mode:multiply; }
    @keyframes playerFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .wulei-layer { position:absolute; bottom:8%; right:3%; z-index:12; animation:playerFloat 2.5s ease-in-out infinite; animation-delay:0.6s; }
    .wulei-layer img { width:160px; height:auto; filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5)); mix-blend-mode:multiply; }
    .sky-stars { position:absolute; inset:0; pointer-events:none; z-index:2; }
    .sky-star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--d) ease-in-out infinite; animation-delay:var(--dl); }
    @keyframes twinkle { 0%,100%{opacity:var(--lo);transform:scale(1)} 50%{opacity:var(--hi);transform:scale(1.4)} }
    .confetti-container { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:20; }
    .confetti { position:absolute; width:var(--w,6px); height:var(--h,10px); background:var(--c); top:-20px; animation:confettiFall var(--cd) linear infinite; animation-delay:var(--dl); border-radius:var(--br,0); opacity:0.8; }
    @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg) scale(1);opacity:0.9} 50%{transform:translateY(50vh) rotate(180deg) scale(0.8);opacity:0.7} 100%{transform:translateY(110vh) rotate(360deg) scale(0.5);opacity:0} }
    .smoke-container { position:absolute; inset:0; pointer-events:none; z-index:3; }
    .smoke-cloud { position:absolute; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,0.1),transparent 70%); animation:smokeFloat var(--sd) ease-in-out infinite; animation-delay:var(--sdl); }
    @keyframes smokeFloat { 0%,100%{transform:translateX(0) scale(1);opacity:0.2} 50%{transform:translateX(var(--sx,20px)) scale(1.15);opacity:0.5} }
    .flag-strip { position:absolute; top:12%; left:0; right:0; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; padding:0 20px; z-index:15; }
    .fs-flag { font-size:0.85rem; opacity:0.6; animation:fsPulse 4s ease-in-out infinite; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
    @keyframes fsPulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.08)} }
    .epic-title { position:absolute; top:3%; left:0; right:0; text-align:center; z-index:25; padding:0 16px; }
    .epic-title h1 { font-family:var(--font-display); font-size:3rem; background:linear-gradient(135deg,#FFD600,#FF6D00,#F44336,#FFD600); background-size:300% 300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:titleShimmer 3s ease infinite; line-height:1; filter:drop-shadow(0 2px 10px rgba(0,0,0,0.7)); }
    @keyframes titleShimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .epic-title .sub { font-family:var(--font-heading); font-size:0.85rem; font-weight:500; color:rgba(255,255,255,0.7); text-shadow:0 1px 6px rgba(0,0,0,0.7); margin-top:2px; }
    .epic-title .zh { font-family:var(--font-zh); font-size:0.95rem; font-weight:700; color:rgba(255,215,0,0.8); text-shadow:0 1px 6px rgba(0,0,0,0.6); }
    .vs-badge { position:absolute; bottom:30%; left:50%; transform:translateX(-50%); font-family:var(--font-display); font-size:2rem; color:#FFD600; text-shadow:0 0 20px rgba(255,214,0,0.6),0 2px 4px rgba(0,0,0,0.6); z-index:13; letter-spacing:0.1em; animation:vsPulse 2s ease-in-out infinite; }
    @keyframes vsPulse { 0%,100%{opacity:0.7;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.1)} }
    .epic-buttons { position:absolute; bottom:2%; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:8px; z-index:30; padding:0 36px; }
    .btn-vamos { padding:15px 56px; border:none; background:linear-gradient(135deg,#F44336,#FF6D00); color:#fff; font-family:var(--font-heading); font-size:1.35rem; font-weight:700; letter-spacing:0.08em; border-radius:50px; cursor:pointer; box-shadow:0 4px 20px rgba(244,67,54,0.4),0 0 40px rgba(244,67,54,0.15); transition:all 0.3s ease; width:100%; max-width:280px; }
    .btn-vamos:hover,.btn-vamos:active { transform:scale(1.05); box-shadow:0 6px 28px rgba(244,67,54,0.5); }
    .btn-sub { padding:9px 28px; border:1.5px solid rgba(255,255,255,0.35); background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); font-family:var(--font-heading); font-size:0.75rem; font-weight:600; border-radius:20px; cursor:pointer; transition:all 0.3s ease; backdrop-filter:blur(4px); }
    .btn-sub:hover { background:rgba(255,255,255,0.15); }

    /* MAIN APP */
    #main { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:4px 16px 0; display:none; background:var(--bg); }
    #main.show { display:block; animation:fadeIn 0.5s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    header { padding:18px 0 12px; display:flex; align-items:center; justify-content:space-between; }
    .brand { font-family:var(--font-display); font-size:1.7rem; letter-spacing:0.05em; background:linear-gradient(135deg,var(--red-bright),var(--orange)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .live-badge { display:flex; align-items:center; gap:6px; font-family:var(--font-heading); font-size:0.7rem; font-weight:600; color:var(--red-bright); background:var(--red-soft); padding:5px 12px; border-radius:20px; }
    .live-dot { width:8px; height:8px; background:var(--red-bright); border-radius:50%; animation:blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .section-title { font-family:var(--font-heading); font-size:0.85rem; font-weight:600; color:var(--text-muted); margin:18px 0 10px; display:flex; align-items:center; gap:8px; }
    .section-title::before { content:'★'; color:var(--gold-bright); }
    .match-card { background:var(--surface); border-radius:var(--radius); padding:16px 16px 14px; margin-bottom:12px; border-left:4px solid var(--gold); box-shadow:var(--shadow); animation:cardIn 0.45s cubic-bezier(0.34,1.56,0.64,1) backwards; }
    .match-card:nth-child(2) { animation-delay:0.08s; border-left-color:var(--red-bright); }
    .match-card:nth-child(3) { animation-delay:0.16s; border-left-color:var(--green-bright); }
    @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
    .match-card.following { border-left-width:5px; box-shadow:0 4px 20px rgba(249,168,37,0.15),var(--shadow); }
    .match-card.event-flash { animation:eFlash 0.4s ease; }
    @keyframes eFlash { 0%{box-shadow:0 0 0 3px rgba(249,168,37,0.4),var(--shadow)} 100%{box-shadow:var(--shadow)} }
    .match-teams { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .team { display:flex; align-items:center; gap:8px; flex:1; }
    .team.away { justify-content:flex-end; text-align:right; }
    .team-flag { font-size:1.8rem; line-height:1; }
    .team-name { font-family:var(--font-heading); font-size:0.92rem; font-weight:600; }
    .match-center { display:flex; flex-direction:column; align-items:center; min-width:80px; }
    .match-score { font-family:var(--font-display); font-size:2.2rem; letter-spacing:0.1em; line-height:1; color:var(--navy); }
    .match-time { font-family:var(--font-heading); font-size:0.7rem; font-weight:600; color:var(--red-bright); margin-top:3px; }
    .match-actions { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; }
    .match-group { font-family:var(--font-heading); font-size:0.65rem; font-weight:500; color:var(--text-muted); background:var(--surface-alt); padding:3px 10px; border-radius:8px; }
    .btn-follow { padding:7px 20px; border:2px solid var(--text-muted); background:transparent; color:var(--text-muted); font-family:var(--font-heading); font-size:0.72rem; font-weight:600; border-radius:20px; cursor:pointer; transition:all 0.3s; }
    .btn-follow:hover { border-color:var(--red-bright); color:var(--red-bright); }
    .btn-follow.active { border-color:var(--red-bright); background:linear-gradient(135deg,var(--red-bright),var(--orange)); color:#fff; }
    .team-label { display:inline-block; font-family:var(--font-heading); font-size:0.6rem; font-weight:600; padding:2px 8px; border-radius:10px; margin-top:4px; }
    .team-label.home-label { background:var(--gold-soft); color:#E65100; }
    .team-label.away-label { background:var(--blue-soft); color:var(--blue); }
    .team-label.all-label { background:var(--green-soft); color:var(--green); }
    .event-feed { margin-top:20px; padding-bottom:100px; }
    .event-item { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); animation:eSlide 0.3s ease; }
    @keyframes eSlide { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
    .event-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:0.95rem; flex-shrink:0; }
    .event-icon.goal{background:var(--gold-soft)} .event-icon.my-goal{background:var(--gold-soft);border:2px solid var(--gold)} .event-icon.opp-goal{background:#3E0000;border:2px solid #600} .event-icon.shot{background:var(--red-soft)} .event-icon.free{background:var(--blue-soft)} .event-icon.danger{background:var(--orange-soft)} .event-icon.yellow{background:#FFFDE7} .event-icon.red{background:var(--red-soft)} .event-icon.whistle{background:#F3E5F5}
    .event-info{flex:1} .event-desc{font-size:0.82rem;line-height:1.4} .event-desc strong{font-weight:700} .event-desc.goal-text{color:var(--orange);font-weight:700} .event-desc.opp-text{color:#880000;font-weight:700} .event-meta{font-family:var(--font-heading);font-size:0.6rem;font-weight:500;color:var(--text-muted);margin-top:2px}
    .feed-empty{text-align:center;padding:32px 0;color:var(--text-muted);font-size:0.88rem;font-style:italic}
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:linear-gradient(to top,var(--bg) 65%,transparent);padding:20px 16px 28px;display:flex;gap:10px;max-width:480px;margin:0 auto}
    .btn-demo{flex:1;padding:14px;border:none;background:linear-gradient(135deg,var(--gold),var(--orange));color:#fff;font-family:var(--font-heading);font-size:0.95rem;font-weight:700;letter-spacing:0.06em;border-radius:var(--radius);cursor:pointer;box-shadow:0 4px 16px rgba(255,109,0,0.25);transition:all 0.3s}
    .btn-demo:hover{transform:scale(1.02)}
    .btn-test{width:52px;padding:14px;border:2px solid var(--text-muted);background:var(--surface);color:var(--text-muted);font-size:1.2rem;border-radius:var(--radius);cursor:pointer;transition:all 0.3s}
    #team-modal{position:fixed;inset:0;z-index:300;display:flex;align-items:flex-end;justify-content:center;background:rgba(26,26,46,0.5);opacity:0;pointer-events:none;transition:opacity 0.3s}
    #team-modal.show{opacity:1;pointer-events:auto}
    .team-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1)}
    #team-modal.show .team-sheet{transform:translateY(0)}
    .team-sheet-title{font-family:var(--font-heading);font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:6px}
    .team-sheet-sub{font-family:var(--font-heading);font-size:0.7rem;font-weight:500;text-align:center;color:var(--text-muted);margin-bottom:18px}
    .team-option{padding:16px;border:2px solid var(--border);background:var(--surface-alt);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px}
    .team-option:hover{border-color:var(--red-bright);background:var(--red-soft)}
    .team-option .flag{font-size:1.8rem} .team-option .name{font-family:var(--font-heading);font-size:0.95rem;font-weight:700;flex:1} .team-option .desc{font-size:0.7rem;color:var(--text-muted);font-family:var(--font-heading)}
    #goal-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(26,26,46,0.82);opacity:0;pointer-events:none;transition:opacity 0.3s}
    #goal-overlay.show{opacity:1;pointer-events:auto} #goal-overlay.flatline-mode{background:rgba(20,0,0,0.88)}
    .goal-ray{position:absolute;width:3px;height:120px;background:linear-gradient(to top,rgba(255,214,0,0.6),transparent);transform-origin:bottom center;animation:rayPulse 1.5s ease-in-out infinite;bottom:50%;left:50%}
    .goal-ray:nth-child(1){transform:translateX(-50%) rotate(0deg)} .goal-ray:nth-child(2){transform:translateX(-50%) rotate(30deg);animation-delay:0.1s} .goal-ray:nth-child(3){transform:translateX(-50%) rotate(60deg);animation-delay:0.2s} .goal-ray:nth-child(4){transform:translateX(-50%) rotate(90deg);animation-delay:0.3s} .goal-ray:nth-child(5){transform:translateX(-50%) rotate(120deg);animation-delay:0.4s} .goal-ray:nth-child(6){transform:translateX(-50%) rotate(150deg);animation-delay:0.5s} .goal-ray:nth-child(7){transform:translateX(-50%) rotate(180deg);animation-delay:0.6s} .goal-ray:nth-child(8){transform:translateX(-50%) rotate(210deg);animation-delay:0.7s} .goal-ray:nth-child(9){transform:translateX(-50%) rotate(240deg);animation-delay:0.8s} .goal-ray:nth-child(10){transform:translateX(-50%) rotate(270deg);animation-delay:0.9s} .goal-ray:nth-child(11){transform:translateX(-50%) rotate(300deg);animation-delay:1s} .goal-ray:nth-child(12){transform:translateX(-50%) rotate(330deg);animation-delay:1.1s}
    @keyframes rayPulse{0%,100%{opacity:0.3;height:100px}50%{opacity:0.8;height:160px}}
    #goal-overlay.flatline-mode .goal-ray{background:linear-gradient(to top,rgba(150,0,0,0.4),transparent)}
    .goal-burst{position:absolute;width:180px;height:180px;border-radius:50%;border:2px solid var(--gold-bright);animation:burstExp 1s ease-out forwards;opacity:0}
    .goal-burst:nth-child(13){animation-delay:0s} .goal-burst:nth-child(14){animation-delay:0.2s} .goal-burst:nth-child(15){animation-delay:0.4s}
    @keyframes burstExp{0%{transform:scale(0.3);opacity:1}100%{transform:scale(5);opacity:0}}
    #goal-overlay.flatline-mode .goal-burst{border-color:#600}
    .goal-text{font-family:var(--font-display);font-size:5.5rem;background:linear-gradient(135deg,#FFD600,#FF6D00,#F44336,#FFD600);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gShimmer 1.5s ease infinite,gPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;letter-spacing:0.12em;z-index:1;filter:drop-shadow(0 0 30px rgba(255,214,0,0.5))}
    @keyframes gShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes gPop{0%{transform:scale(0) rotate(-8deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
    #goal-overlay.flatline-mode .goal-text{font-size:3rem;background:linear-gradient(135deg,#600,#400,#600);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(100,0,0,0.5))}
    .goal-detail{font-family:var(--font-heading);font-size:1rem;font-weight:600;color:#fff;margin-top:16px;opacity:0;animation:fUp 0.4s ease 0.5s forwards;z-index:1;text-align:center}
    .goal-detail .flag{font-size:1.8rem;display:block;margin-bottom:4px}
    @keyframes fUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

// ============================================================
// ATAQUE ESCALANTE
// 100→110→120→130→140→150→160 BPM
// Cada 8 latidos sube un nivel
// ============================================================

const dangerStates = {};

function triggerDanger(matchId) {
  const now = Date.now();
  if (dangerStates[matchId] && dangerStates[matchId].active) {
    dangerStates[matchId].lastEvent = now;
    clearTimeout(dangerStates[matchId].fadeTimer);
    dangerStates[matchId].fadeTimer = setTimeout(() => fadeOutDanger(matchId), 8000);
    return;
  }
  dangerStates[matchId] = { active:true, beatCount:0, startTime:now, lastEvent:now, timer:null, fadeTimer:null };
  escalateHeartbeat(matchId);
  dangerStates[matchId].fadeTimer = setTimeout(() => fadeOutDanger(matchId), 8000);
}

function escalateHeartbeat(matchId) {
  const ds = dangerStates[matchId];
  if (!ds || !ds.active) return;
  const level = Math.min(Math.floor(ds.beatCount / 8), 6);
  const bpm = 100 + (level * 10);
  const cycleMs = 60000 / bpm;
  const lub = Math.round(70 + (level * 12));
  const dub = Math.round(70 + (level * 12));
  const gap = Math.round(40 + (level * 5));
  const mainPause = Math.round(cycleMs - lub - dub - gap);
  const pattern = [lub, gap, dub, Math.max(mainPause, 15)];
  doVibrate(pattern);
  ds.beatCount++;
  const totalDuration = pattern.reduce((a, b) => a + b, 0);
  ds.timer = setTimeout(() => escalateHeartbeat(matchId), totalDuration);
}

function fadeOutDanger(matchId) {
  const ds = dangerStates[matchId];
  if (!ds) return;
  ds.active = false;
  clearTimeout(ds.timer);
  doVibrate([50, 500, 40, 700, 30]);
  setTimeout(() => { delete dangerStates[matchId]; }, 2000);
}

function stopDanger(matchId) {
  if (dangerStates[matchId]) {
    dangerStates[matchId].active = false;
    clearTimeout(dangerStates[matchId].timer);
    clearTimeout(dangerStates[matchId].fadeTimer);
    if ('vibrate' in navigator) try { navigator.vibrate(0); } catch(e) {}
    delete dangerStates[matchId];
  }
}

function stopAllDanger() {
  Object.keys(dangerStates).forEach(id => stopDanger(id));
}

function doVibrate(pattern) {
  const m = SENS_MULT[CONFIG.sensitivity] || 1;
  const s = pattern.map(v => Math.round(v * m));
  if ('vibrate' in navigator) try { navigator.vibrate(s); } catch(e) {}
  const d = s.reduce((a, b) => a + b, 0);
  const i = document.getElementById('vibraIndicator');
  i.classList.add('active');
  setTimeout(() => i.classList.remove('active'), d);
}

    const c = state.chosenTeam[m.id];
    let l = '';
    if (f && c === 'home') l = `<span class="team-label home-label">⚽ ${m.home}</span>`;
    else if (f && c === 'away') l = `<span class="team-label away-label">⚽ ${m.away}</span>`;
    else if (f) l = `<span class="team-label all-label">⚽ Todos</span>`;
    return `<div class="match-card ${f?'following':''}" id="card-${m.id}">
      <div class="match-teams">
        <div class="team home"><span class="team-flag">${m.homeFlag}</span><span class="team-name">${m.home}</span></div>
        <div class="match-center"><div class="match-score">${m.score[0]} — ${m.score[1]}</div><div class="match-time">${m.minute}'</div></div>
        <div class="team away"><span class="team-name">${m.away}</span><span class="team-flag">${m.awayFlag}</span></div>
      </div>
      <div class="match-actions"><span class="match-group">${m.group} ${l}</span>
        <button class="btn-follow ${f?'active':''}" onclick="toggleFollow(${m.id})">${f?'● SIGUIENDO':'SEGUIR'}</button>
      </div></div>`;
  }).join('');
}

// ============================================================
// MODALES
// ============================================================

function openTeamModal(mid) {
  const m = state.matches.find(x => x.id === mid);
  if (!m) return;
  state.pendingTeamPicker = mid;
  dom.teamSub.textContent = `${m.homeFlag} ${m.home} vs ${m.away} ${m.awayFlag}`;
  dom.teamOpts.innerHTML = `
    <div class="team-option" onclick="chooseTeam(${mid},'home')"><span class="flag">${m.homeFlag}</span><span class="name">${m.home}</span><span class="desc">Solo vibrás por goles y ataques de ${m.home}</span></div>
    <div class="team-option" onclick="chooseTeam(${mid},'away')"><span class="flag">${m.awayFlag}</span><span class="name">${m.away}</span><span class="desc">Solo vibrás por goles y ataques de ${m.away}</span></div>
    <div class="team-option" onclick="chooseTeam(${mid},null)"><span class="flag">🌍</span><span class="name">Todos los goles</span><span class="desc">Vibrás por cualquier acción</span></div>`;
  dom.teamMod.classList.add('show');
}

function closeTeamModal() { dom.teamMod.classList.remove('show'); state.pendingTeamPicker = null; }

function chooseTeam(mid, s) {
  state.chosenTeam[mid] = s;
  state.followed.add(mid);
  closeTeamModal();
  startDemo(mid);
  if (state.followed.size > 0) dom.pulseBg.classList.add('fast');
  renderMatches();
  if (!CONFIG.notifEnabled && 'Notification' in window)
    Notification.requestPermission().then(p => { CONFIG.notifEnabled = (p === 'granted'); });
}

function toggleFollow(id) {
  if (state.followed.has(id)) {
    state.followed.delete(id);
    delete state.chosenTeam[id];
    stopDemo(id);
    if (state.followed.size === 0) dom.pulseBg.classList.remove('fast');
    renderMatches();
  } else openTeamModal(id);
}

// ============================================================
// EVENTOS
// ============================================================

function addEvent(mid, ev) {
  const match = state.matches.find(m => m.id === mid);
  if (!match) return;
  const ch = state.chosenTeam[mid];
  const opp = ch && ev.team !== ch && ch !== null;
  const ic = ev.type === 'goal' ? (opp ? 'opp-goal' : 'my-goal') :
    ev.type === 'shot' ? 'shot' : ev.type === 'free_kick' ? 'free' :
    ev.type === 'danger' ? 'danger' : 'whistle';
  const tF = ev.team === 'home' ? match.homeFlag : match.awayFlag;
  let desc = '';
  switch(ev.type) {
    case 'goal': desc = opp ? `<strong class="opp-text">${tF} Gol de ${ev.scorer||ev.player}</strong>` : `<strong class="goal-text">${tF} ¡GOL de ${ev.scorer||ev.player}!</strong>`; break;
    case 'shot': desc = `${tF} Tiro al arco — ${ev.player||''}`; break;
    case 'free_kick': desc = `${tF} Tiro libre`; break;
    case 'danger': desc = `${tF} ¡Jugada de peligro!`; break;
    case 'end': desc = `${match.homeFlag} ${match.home} ${match.score[0]} - ${match.score[1]} ${match.away} ${match.awayFlag} — Final`; break;
    default: desc = `${tF} ${ev.type}`;
  }
  const emp = dom.eventFeed.querySelector('.feed-empty');
  if (emp) emp.remove();
  const el = document.createElement('div');
  el.className = 'event-item';
  el.innerHTML = `<div class="event-icon ${ic}">${EV_ICON[ev.type]||'•'}</div><div class="event-info"><div class="event-desc">${desc}</div><div class="event-meta">${ev.minute}' — ${match.home} vs ${match.away}</div></div>`;
  dom.eventFeed.insertBefore(el, dom.eventFeed.firstChild);
  while (dom.eventFeed.children.length > 30) dom.eventFeed.removeChild(dom.eventFeed.lastChild);
}

function updateScore(mid, t) { const m = state.matches.find(x => x.id === mid); if (m) t === 'home' ? m.score[0]++ : m.score[1]++; }
function flashCard(mid) { const c = document.getElementById(`card-${mid}`); if (!c) return; c.classList.remove('event-flash'); void c.offsetWidth; c.classList.add('event-flash'); setTimeout(() => c.classList.remove('event-flash'), 500); }
function showToast(icon, text, ms = 3500) { dom.toastIco.textContent = icon; dom.toastTxt.textContent = text; dom.toast.classList.add('show'); setTimeout(() => dom.toast.classList.remove('show'), ms); }

function showGoalOverlay(mid, ev) {
  const m = state.matches.find(x => x.id === mid);
  if (!m) return;
  const ch = state.chosenTeam[mid];
  const opp = ch && ev.team !== ch && ch !== null;
  const tF = ev.team === 'home' ? m.homeFlag : m.awayFlag;
  if (opp) {
    dom.goalOver.classList.add('flatline-mode');
    dom.goalText.textContent = 'GOL EN CONTRA';
    dom.goalDet.innerHTML = `<span class="flag">${tF}</span>${ev.scorer||ev.player||''}<br><small style="color:rgba(255,255,255,0.4)">${ev.minute}'</small>`;
    dom.pulseBg.classList.add('flatline');
    triggerFlatline();
    sendNotif(`📉 Gol de ${ev.scorer||''}`, `${m.home} ${m.score[0]} - ${m.score[1]} ${m.away}`);
  } else {
    dom.goalOver.classList.remove('flatline-mode');
    dom.goalText.textContent = '¡GOL!';
    dom.goalDet.innerHTML = `<span class="flag">${tF}</span>${ev.scorer||ev.player||''}<br><small style="color:rgba(255,255,255,0.6)">${ev.minute}'</small>`;
    dom.pulseBg.classList.remove('flatline');
    dom.pulseBg.classList.add('goal');
    triggerGoalCelebration();
    sendNotif(`⚽ ¡GOL! ${ev.scorer||''}`, `${m.home} ${m.score[0]} - ${m.score[1]} ${m.away}`);
  }
  dom.goalOver.classList.add('show');
  setTimeout(() => {
    dom.goalOver.classList.remove('show','flatline-mode');
    dom.pulseBg.classList.remove('goal','flatline');
  }, opp ? 6000 : 5000);
}

function sendNotif(t, b) {
  if (!CONFIG.notifEnabled || !('Notification' in window)) return;
  try { new Notification(t, { body: b, tag: 'vibra-futbol' }); } catch(e) {}
}

// ============================================================
// DEMO ENGINE
// ============================================================

function startDemo(mid) {
  const evs = DEMO_EVENTS[mid];
  if (!evs) return;
  state.minuteIntervals[mid] = setInterval(() => {
    const m = state.matches.find(x => x.id === mid);
    if (m && m.minute < 90) { m.minute++; const el = document.querySelector(`#card-${mid} .match-time`); if (el) el.textContent = m.minute + "'"; }
  }, 2000);
  if (!state.demoTimers[mid]) state.demoTimers[mid] = [];
  evs.forEach(ev => {
    const t = setTimeout(() => {
      if (!state.followed.has(mid)) return;
      const m = state.matches.find(x => x.id === mid);
      if (m) m.minute = ev.minute;
      const te = document.querySelector(`#card-${mid} .match-time`);
      if (te) te.textContent = ev.minute + "'";
      flashCard(mid);
      const vib = shouldVibrate(mid, ev);
      switch(ev.type) {
        case 'danger':
          if (vib) triggerDanger(mid);
          break;
        case 'shot':
          if (vib) doVibrate(VIB.shot);
          break;
        case 'free_kick':
          if (vib) doVibrate(VIB.free_kick);
          break;
        case 'goal':
          updateScore(mid, ev.team);
          renderMatches();
          const card = document.getElementById(`card-${mid}`);
          if (card) card.classList.add('following');
          setTimeout(() => showGoalOverlay(mid, ev), 300);
          break;
        case 'yellow':
        case 'red':
          break;
        case 'end':
          stopDanger(mid);
          if (vib) doVibrate(VIB.end);
          showToast('🏁', `Final: ${m.home} ${m.score[0]} - ${m.score[1]} ${m.away}`);
          break;
      }
      if (ev.type === 'shot' || ev.type === 'free_kick' || ev.type === 'danger') {
        const lb = { shot:'Tiro al arco', free_kick:'Tiro libre', danger:'Jugada de peligro' };
        showToast(EV_ICON[ev.type]||'•', `${lb[ev.type]||ev.type} — ${ev.team==='home'?m.home:m.away} ${ev.minute}'`);
      }
      addEvent(mid, ev);
    }, ev.delay);
    state.demoTimers[mid].push(t);
  });
}

function stopDemo(mid) {
  stopDanger(mid);
  if (state.demoTimers[mid]) { state.demoTimers[mid].forEach(clearTimeout); delete state.demoTimers[mid]; }
  if (state.minuteIntervals[mid]) { clearInterval(state.minuteIntervals[mid]); delete state.minuteIntervals[mid]; }
  const m = state.matches.find(x => x.id === mid);
  if (m) { m.score = [0,0]; m.minute = 0; }
  renderMatches();
}

// ============================================================
// VIBRA MODAL
// ============================================================

function openVibraModal() { dom.vibraMod.classList.add('show'); }
function closeVibraModal() { dom.vibraMod.classList.remove('show'); }

// ============================================================
// INIT
// ============================================================

function init() {
  setupBackgroundMode();
  dom.btnEnter.addEventListener('click', () => {
    dom.splash.classList.add('hide');
    dom.main.classList.add('show');
    dom.bottomBar.classList.remove('hidden');
    setTimeout(() => dom.splash.style.display = 'none', 800);
  });
  document.getElementById('btnAbout').addEventListener('click', () => {
    alert('Vibra Fútbol (足球震动)\n\nHerramienta de bienestar emocional para trabajadores a través de la pasión futbolera.\n\nUn proyecto de cooperación cultural Argentina-China.');
  });
  renderMatches();
  dom.btnDemo.addEventListener('click', openVibraModal);
  dom.btnTest.addEventListener('click', openVibraModal);
  dom.vibraMod.addEventListener('click', e => { if (e.target === dom.vibraMod) closeVibraModal(); });
  dom.teamMod.addEventListener('click', e => { if (e.target === dom.teamMod) closeTeamModal(); });
  document.querySelectorAll('.vibra-btn[data-pattern]').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = btn.dataset.pattern;
      if (p === 'danger') { triggerDanger('demo'); }
      else if (p === 'goal') triggerGoalCelebration();
      else if (p === 'opp_goal') triggerFlatline();
      else if (VIB[p]) doVibrate(VIB[p]);
      btn.style.borderColor = 'var(--red-bright)'; btn.style.background = 'var(--red-soft)';
      setTimeout(() => { btn.style.borderColor = ''; btn.style.background = ''; }, 600);
    });
  });
  document.querySelectorAll('.toggle-btn[data-sensitivity]').forEach(btn => {
    btn.addEventListener('click', () => {
      CONFIG.sensitivity = btn.dataset.sensitivity;
      document.querySelectorAll('.toggle-btn[data-sensitivity]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  dom.goalOver.addEventListener('click', () => {
    dom.goalOver.classList.remove('show','flatline-mode');
    dom.pulseBg.classList.remove('goal','flatline');
  });
  console.log('✅ Vibra Fútbol v7.1 — Ataque escalante + Flatline recuperación');
}

init();
</script>
